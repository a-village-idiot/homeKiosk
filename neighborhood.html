    function photoMarker(lat, lng, img, label, popup, category) {

        html: `<div class="photo-pin" title="${label}">
                 <img src="${img}" alt="${label}" />
               </div>`,
        className: '',
        iconSize: [56, 56],
        iconAnchor: [28, 56],
        popupAnchor: [0, -60]
      });
      const marker = L.marker([lat, lng], { icon }).bindPopup(popup);
      categories[category].push(marker);
    }

        <img src="assets/photos/orangetheory-canton.jpg" alt="Orangetheory Fitness Canton" />
        <div class="poi-popup__body">
          <strong>Orangetheory Fitness — Canton</strong>
          <p>8 min drive · Heart-rate based group fitness studio with coach-led workouts.</p>
        </div>
      </div>`,
      'health'
    );
    // ── Category button logic ────────────────────────────────
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const cat = btn.dataset.cat;
        const isActive = btn.classList.contains('active');

        // Hide all markers and deactivate all buttons
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        Object.values(categories).forEach(markers =>
          markers.forEach(m => m.remove())
        );

        // If this button wasn't already active, show its markers and fit the map
        if (!isActive) {
          btn.classList.add('active');
          const markers = categories[cat];
          markers.forEach(m => m.addTo(map));

          if (markers.length > 0) {
            const group = L.featureGroup([homeMarker, ...markers]);
            map.fitBounds(group.getBounds(), { padding: [70, 70] });
          }
        }
      });
    });
  </script>

</body>
</html>
